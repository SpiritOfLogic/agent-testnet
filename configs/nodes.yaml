# Example testnet node definitions.
# Each entry maps domain names to a testnet node's real address.
# The server auto-assigns VIPs and configures DNS + DNAT routing.
#
# NOTE: Domain matching is exact (no wildcards). List each FQDN explicitly.
#
# For production, set via NODES_YAML env var with install.sh:
#   NODES_YAML='...' sudo -E bash install.sh server
nodes:
  - name: "example-node"
    address: "1.2.3.4:443"
    secret: "change-me"
    domains:
      - "google.com"
      - "www.google.com"
      - "github.com"
      - "api.github.com"
